spring:
  application:
    name: content-marketplace

  datasource:
    url: jdbc:postgresql://localhost:5432/content_marketplace
    username: marketplace
    password: marketplace_secret
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  elasticsearch:
    uris: http://localhost:9200

server:
  port: 8080

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

logging:
  level:
    com.tianzige.marketplace: DEBUG
    org.springframework.data.elasticsearch: DEBUG
